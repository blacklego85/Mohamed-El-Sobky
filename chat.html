<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
(function(){
  try{
    var saved = localStorage.getItem('theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if(theme === 'dark'){ document.documentElement.setAttribute('data-theme','dark'); }
  }catch(e){}
})();
// robust mobile viewport height (fixes composer bar hidden on some mobile browsers)
(function(){
  function setVH(){
    var h = (window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-vh', h + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', setVH);
  if(window.visualViewport){ window.visualViewport.addEventListener('resize', setVH); }
})();
</script>
<title>الدردشة | أ. محمد السبكي</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#11172A;--ink-2:#1B2440;--ink-3:#232F55;
  --parchment:#F7F1E1;--parchment-2:#EEE3C4;
  --gold:#C89B3C;--gold-light:#E7C878;--maroon:#7C2E2E;
  --text-dark:#241E13;--text-light:#F3ECD9;
  --page-bg:var(--parchment);--card-bg:#ffffff;--card-bg-2:var(--parchment-2);
  --text-primary:var(--text-dark);--text-muted:#4a4636;--text-muted-2:#8a8064;
  --border-soft:#e8ddc0;--footer-bg:#0C1120;--footer-text:#B8B097;
  --bubble-own:#EFE1BC;--bubble-other:#ffffff;--danger:#D9534F;
  color-scheme:light;
}
html[data-theme="dark"]{
  --page-bg:#0d1220;--card-bg:#1B2440;--card-bg-2:#232F55;
  --text-primary:#F3ECD9;--text-muted:#B8B097;--text-muted-2:#a49c83;
  --border-soft:rgba(243,236,217,0.12);--footer-bg:#070a14;--footer-text:#94916f;
  --bubble-own:#3a3220;--bubble-other:#1B2440;
  color-scheme:dark;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Cairo',sans-serif;background:var(--page-bg);color:var(--text-primary);
  height:100vh;height:100dvh;height:var(--app-vh,100vh);overflow:hidden;transition:background .35s ease,color .35s ease;
  display:flex;flex-direction:column;
}
h1,h2,.display{font-family:'Amiri',serif;}
a{text-decoration:none;color:inherit;}
button{font-family:'Cairo',sans-serif;cursor:pointer;}

.top-bar{flex:none;background:var(--ink);padding:calc(12px + env(safe-area-inset-top,0px)) 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{font-family:'Amiri',serif;font-size:18px;color:var(--text-light);display:flex;align-items:center;gap:6px;}
.logo span{color:var(--gold);}
.top-actions{display:flex;align-items:center;gap:10px;}
.back-link{color:var(--gold);font-size:13px;white-space:nowrap;}
.theme-toggle{width:34px;height:34px;border-radius:50%;background:var(--ink-2);border:1px solid rgba(200,155,60,0.3);color:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex:none;}
.my-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold);}

.app{flex:1;min-height:0;display:flex;}

/* rooms sidebar */
.rooms{width:230px;flex:none;background:var(--card-bg);border-left:1px solid var(--border-soft);overflow-y:auto;padding:10px;}
.room-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:12px 12px;border-radius:12px;border:none;
  background:none;color:var(--text-primary);font-size:14px;text-align:right;margin-bottom:4px;transition:.2s;
}
.room-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex:none;opacity:0;}
.room-btn:hover{background:var(--card-bg-2);}
.room-btn.active{background:var(--gold);color:var(--ink);font-weight:700;}
.room-btn.active .dot{opacity:1;background:var(--ink);}

/* mobile rooms as horizontal pills */
.rooms-mobile{display:none;}

/* chat area */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
.chat-header{flex:none;padding:16px 20px;border-bottom:1px solid var(--border-soft);background:var(--card-bg);}
.chat-header h2{font-size:17px;}
.messages{flex:1;min-height:0;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.msg-row{display:flex;gap:10px;max-width:78%;}
.msg-row.own{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex:none;background:var(--card-bg-2);}
.msg-body{display:flex;flex-direction:column;gap:3px;}
.msg-row.own .msg-body{align-items:flex-end;}
.msg-name{font-size:12px;font-weight:700;color:var(--text-muted-2);display:flex;align-items:center;gap:4px;}
.msg-name .badge{color:var(--gold);font-size:12px;}
.msg-bubble{background:var(--bubble-other);padding:10px 14px;border-radius:14px;font-size:14.5px;line-height:1.7;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.05);word-break:break-word;}
.msg-row.own .msg-bubble{background:var(--bubble-own);}
.msg-time{font-size:10.5px;color:var(--text-muted-2);}
.msg-time .edited{opacity:.7;margin-right:4px;}
.msg-del{background:none;border:none;color:var(--danger);font-size:12px;opacity:.6;cursor:pointer;align-self:center;}
.msg-del:hover{opacity:1;}
.msg-edit{background:none;border:none;color:var(--gold);font-size:13px;opacity:.7;cursor:pointer;align-self:center;}
.msg-edit:hover{opacity:1;}
.edit-box{display:flex;gap:6px;align-items:center;}
.edit-box input{
  padding:8px 12px;border-radius:10px;border:1px solid var(--border-soft);
  background:var(--page-bg);color:var(--text-primary);font-family:'Cairo',sans-serif;font-size:14px;outline:none;min-width:180px;
}
.edit-box button{background:var(--gold);color:var(--ink);border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;flex:none;}
.edit-box .cancel-edit{background:none;color:var(--text-muted);}
.empty-state{margin:auto;text-align:center;color:var(--text-muted-2);font-size:14px;}

.composer{flex:none;display:flex;gap:10px;padding:14px 18px calc(14px + env(safe-area-inset-bottom,0px));background:var(--card-bg);border-top:1px solid var(--border-soft);}
.composer input{
  flex:1;padding:13px 16px;border-radius:100px;border:1px solid var(--border-soft);
  background:var(--page-bg);color:var(--text-primary);font-family:'Cairo',sans-serif;font-size:14px;outline:none;
}
.composer button{
  width:46px;height:46px;border-radius:50%;border:none;flex:none;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--ink);font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:transform .2s ease;
}
.composer button:hover{transform:scale(1.06);}
.composer button:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.attach-btn{background:var(--card-bg-2) !important;color:var(--text-primary) !important;}

/* ambient calm background (works with light + dark) */
.ambient-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none;}
.ambient-bg span{position:absolute;font-family:'Amiri',serif;color:var(--gold);opacity:.045;will-change:transform;animation:ambientDrift linear infinite;}
html[data-theme="dark"] .ambient-bg span{opacity:.07;}
@keyframes ambientDrift{
  0%{transform:translate(0,0) rotate(0deg);}
  50%{transform:translate(-22px,-30px) rotate(8deg);}
  100%{transform:translate(0,0) rotate(0deg);}
}

/* reply preview bar above composer */
.reply-preview{
  display:none;align-items:center;gap:10px;padding:10px 18px;background:var(--card-bg-2);
  border-top:1px solid var(--border-soft);font-size:13px;
}
.reply-preview.show{display:flex;}
.reply-preview .rp-bar{width:3px;align-self:stretch;background:var(--gold);border-radius:3px;flex:none;}
.reply-preview .rp-body{flex:1;min-width:0;}
.reply-preview .rp-name{color:var(--gold);font-weight:700;font-size:12px;}
.reply-preview .rp-text{color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-preview .rp-close{background:none;border:none;color:var(--text-muted-2);font-size:18px;flex:none;cursor:pointer;}

/* reply quote shown inside a message bubble */
.msg-quote{
  background:rgba(0,0,0,0.06);border-right:3px solid var(--gold);border-radius:8px;
  padding:6px 10px;margin-bottom:6px;font-size:12.5px;cursor:pointer;
}
html[data-theme="dark"] .msg-quote{background:rgba(255,255,255,0.06);}
.msg-quote .qname{color:var(--gold);font-weight:700;display:block;font-size:11.5px;}
.msg-quote .qtext{color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:220px;}

/* message action popup (reply / edit / delete) */
.msg-bubble{cursor:pointer;}
.msg-actions-menu{
  position:fixed;z-index:800;background:var(--card-bg);border:1px solid var(--border-soft);border-radius:14px;
  box-shadow:0 16px 40px rgba(0,0,0,0.25);padding:6px;min-width:150px;display:none;flex-direction:column;
}
.msg-actions-menu.show{display:flex;}
.msg-actions-menu button{
  background:none;border:none;text-align:right;padding:10px 14px;border-radius:9px;font-size:13.5px;
  color:var(--text-primary);display:flex;align-items:center;gap:8px;
}
.msg-actions-menu button:hover{background:var(--card-bg-2);}
.msg-actions-menu button.danger{color:var(--danger);}
.msg-actions-overlay{position:fixed;inset:0;z-index:799;display:none;}
.msg-actions-overlay.show{display:block;}

/* image / file messages */
.msg-image{max-width:230px;border-radius:14px;display:block;cursor:pointer;margin-bottom:2px;}
.msg-file-card{
  display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.05);border-radius:12px;padding:10px 12px;min-width:190px;
}
html[data-theme="dark"] .msg-file-card{background:rgba(255,255,255,0.06);}
.msg-file-card .fic{font-size:22px;flex:none;}
.msg-file-card .finfo{min-width:0;}
.msg-file-card .fname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.msg-file-card .fsize{font-size:11px;color:var(--text-muted-2);}
.upload-chip{
  display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12.5px;color:var(--text-muted);
  background:var(--card-bg-2);border-radius:100px;margin:0 18px;
}
.upload-chip .spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--gold);border-top-color:transparent;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.gate{position:fixed;inset:0;background:var(--page-bg);z-index:500;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.gate.hide{display:none;}
.gate-box{max-width:340px;}
.gate-box .icon{font-size:40px;margin-bottom:14px;}
.gate-box h2{font-size:19px;margin-bottom:10px;}
.gate-box p{color:var(--text-muted);font-size:14px;line-height:1.9;margin-bottom:20px;}
.gate-box a{display:inline-block;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--ink);padding:12px 30px;border-radius:100px;font-weight:700;font-size:14px;}

@media(max-width:760px){
  .rooms{display:none;}
  .rooms-mobile{
    display:flex;flex:none;gap:8px;overflow-x:auto;padding:10px 14px;background:var(--card-bg);
    border-bottom:1px solid var(--border-soft);
  }
  .rooms-mobile button{
    flex:none;padding:9px 16px;border-radius:100px;border:1px solid var(--border-soft);
    background:none;color:var(--text-primary);font-size:13px;white-space:nowrap;
  }
  .rooms-mobile button.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}
  .msg-row{max-width:88%;}
}
</style>
</head>
<body>

<div class="ambient-bg" id="ambientBg"></div>

<div class="top-bar">
  <a href="index.html" class="logo">أ<span>.</span> محمد السبكي</a>
  <div class="top-actions">
    <a href="index.html" class="back-link">→ الرئيسية</a>
    <button class="theme-toggle" id="themeToggle" title="تبديل الوضع">🌙</button>
    <img class="my-avatar" id="myAvatar" src="" alt="">
  </div>
</div>

<div class="rooms-mobile" id="roomsMobile"></div>

<div class="app">
  <div class="rooms" id="rooms"></div>
  <div class="chat-area">
    <div class="chat-header"><h2 id="roomTitle">الدردشة العامة</h2></div>
    <div class="messages" id="messages"><div class="empty-state">جاري التحميل...</div></div>
    <div class="reply-preview" id="replyPreview">
      <div class="rp-bar"></div>
      <div class="rp-body">
        <div class="rp-name" id="rpName"></div>
        <div class="rp-text" id="rpText"></div>
      </div>
      <button type="button" class="rp-close" id="rpClose">×</button>
    </div>
    <div class="upload-chip" id="uploadChip" style="display:none;"><span class="spin"></span><span id="uploadChipText">جاري رفع الملف...</span></div>
    <form class="composer" id="composer">
      <input type="file" id="fileInput" accept="image/*,.pdf,application/pdf" hidden>
      <button type="button" id="attachBtn" class="attach-btn" title="إرفاق صورة أو PDF">📎</button>
      <input type="text" id="msgInput" placeholder="اكتب رسالتك..." maxlength="900" autocomplete="off">
      <button type="submit" id="sendBtn">➤</button>
    </form>

    <div class="msg-actions-overlay" id="actionsOverlay"></div>
    <div class="msg-actions-menu" id="actionsMenu"></div>
  </div>
</div>

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="icon">🔒</div>
    <h2>لازم تسجل دخول الأول</h2>
    <p>الدردشة متاحة بس للطلاب المسجلين. سجل دخولك بحسابك عشان تقدر تشارك.</p>
    <a href="login.html?redirect=chat.html">تسجيل الدخول</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, collection, addDoc, deleteDoc, updateDoc,
  query, orderBy, limit, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxpnYFbxF7Vtx_Y0v5cCbZddsUbs1Q2co",
  authDomain: "mohamed-el-sobky-be252.firebaseapp.com",
  projectId: "mohamed-el-sobky-be252",
  storageBucket: "mohamed-el-sobky-be252.firebasestorage.app",
  messagingSenderId: "1076421037716",
  appId: "1:1076421037716:web:4145cd3c5a6787ba0fee81",
  measurementId: "G-2W4LHCPTL1"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// theme toggle
const themeToggle = document.getElementById('themeToggle');
function applyThemeIcon(){ themeToggle.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙'; }
applyThemeIcon();
themeToggle.addEventListener('click', ()=>{
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if(isDark){ document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
  else{ document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
  applyThemeIcon();
});

// calm ambient background letters
(function(){
  const letters=['ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','س','ع','ف','ق','ل','م','ن','ه'];
  const layer=document.getElementById('ambientBg');
  const positions=[[8,12],[85,10],[20,55],[70,60],[45,80],[90,85],[5,90],[55,25]];
  positions.forEach(pos=>{
    const s=document.createElement('span');
    s.textContent=letters[Math.floor(Math.random()*letters.length)];
    s.style.left=pos[0]+'%';
    s.style.top=pos[1]+'%';
    s.style.fontSize=(50+Math.random()*70)+'px';
    s.style.animationDuration=(16+Math.random()*14)+'s';
    s.style.animationDelay=(Math.random()*8)+'s';
    layer.appendChild(s);
  });
})();

const ROOMS = [
  { id: 'general', name: 'الدردشة العامة' },
  { id: 'course-nahw-i', name: 'النحو والصرف الشامل (إعدادي)' },
  { id: 'course-tabir-i', name: 'التعبير والإملاء (إعدادي)' },
  { id: 'course-nusus-i', name: 'النصوص والأدب (إعدادي)' },
  { id: 'course-nahw-th', name: 'النحو الشامل + بنك أسئلة (ثانوي)' },
  { id: 'course-balagha-th', name: 'البلاغة بالتحليل (ثانوي)' },
  { id: 'course-muraga-th', name: 'مراجعة نهائية شاملة (ثانوي)' }
];

const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><rect width="96" height="96" fill="%231B2440"/><circle cx="48" cy="38" r="18" fill="%23C89B3C"/><path d="M14 88c4-20 24-30 34-30s30 10 34 30" fill="%23C89B3C" opacity="0.6"/></svg>'
);

const roomsEl = document.getElementById('rooms');
const roomsMobileEl = document.getElementById('roomsMobile');
const roomTitleEl = document.getElementById('roomTitle');
const messagesEl = document.getElementById('messages');
const composer = document.getElementById('composer');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const gateEl = document.getElementById('gate');
const myAvatarEl = document.getElementById('myAvatar');
const replyPreviewEl = document.getElementById('replyPreview');
const rpNameEl = document.getElementById('rpName');
const rpTextEl = document.getElementById('rpText');
const rpCloseEl = document.getElementById('rpClose');
const fileInputEl = document.getElementById('fileInput');
const attachBtnEl = document.getElementById('attachBtn');
const uploadChipEl = document.getElementById('uploadChip');
const uploadChipTextEl = document.getElementById('uploadChipText');
const actionsMenuEl = document.getElementById('actionsMenu');
const actionsOverlayEl = document.getElementById('actionsOverlay');

let currentUser = null;
let currentProfile = null;
let isAdmin = false;
let currentRoom = 'general';
let unsubscribe = null;
let replyingTo = null;
const messagesCache = {};

function renderRoomLists(){
  roomsEl.innerHTML = '';
  roomsMobileEl.innerHTML = '';
  ROOMS.forEach(r=>{
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (r.id===currentRoom ? ' active' : '');
    btn.innerHTML = '<span class="dot"></span><span>'+r.name+'</span>';
    btn.addEventListener('click', ()=> switchRoom(r.id));
    roomsEl.appendChild(btn);

    const mbtn = document.createElement('button');
    mbtn.textContent = r.name;
    mbtn.className = r.id===currentRoom ? 'active' : '';
    mbtn.addEventListener('click', ()=> switchRoom(r.id));
    roomsMobileEl.appendChild(mbtn);
  });
}

function switchRoom(roomId){
  currentRoom = roomId;
  const room = ROOMS.find(r=>r.id===roomId);
  roomTitleEl.textContent = room ? room.name : '';
  clearReply();
  closeActionsMenu();
  renderRoomLists();
  listenMessages();
}

function formatTime(ts){
  if(!ts || !ts.toDate) return '';
  const d = ts.toDate();
  return d.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
}

function formatFileSize(bytes){
  if(!bytes) return '';
  if(bytes < 1024*1024) return Math.round(bytes/1024)+' كيلوبايت';
  return (bytes/(1024*1024)).toFixed(1)+' ميجابايت';
}

// ---- reply bar ----
function setReplyTarget(id, name, text){
  replyingTo = { id, name, text: text || '📎 ملف مرفق' };
  rpNameEl.textContent = 'الرد على ' + name;
  rpTextEl.textContent = replyingTo.text;
  replyPreviewEl.classList.add('show');
  msgInput.focus();
}
function clearReply(){
  replyingTo = null;
  replyPreviewEl.classList.remove('show');
}
rpCloseEl.addEventListener('click', clearReply);

// ---- action menu (reply / edit / delete) ----
function closeActionsMenu(){
  actionsMenuEl.classList.remove('show');
  actionsOverlayEl.classList.remove('show');
  actionsMenuEl.innerHTML = '';
}
actionsOverlayEl.addEventListener('click', closeActionsMenu);

function openActionsMenu(anchorEl, actions){
  actionsMenuEl.innerHTML = '';
  actions.forEach(a=>{
    const btn = document.createElement('button');
    btn.className = a.danger ? 'danger' : '';
    btn.innerHTML = a.icon + ' <span>' + a.label + '</span>';
    btn.addEventListener('click', ()=>{ closeActionsMenu(); a.onClick(); });
    actionsMenuEl.appendChild(btn);
  });
  const rect = anchorEl.getBoundingClientRect();
  actionsMenuEl.classList.add('show');
  actionsOverlayEl.classList.add('show');
  const menuHeight = actionsMenuEl.offsetHeight;
  let top = rect.bottom + 6;
  if(top + menuHeight > window.innerHeight - 20){ top = rect.top - menuHeight - 6; }
  let left = rect.left;
  if(left + 160 > window.innerWidth - 10){ left = window.innerWidth - 170; }
  actionsMenuEl.style.top = Math.max(10,top) + 'px';
  actionsMenuEl.style.left = Math.max(10,left) + 'px';
}

// ---- file upload ----
attachBtnEl.addEventListener('click', ()=> fileInputEl.click());
fileInputEl.addEventListener('change', async ()=>{
  const file = fileInputEl.files[0];
  fileInputEl.value = '';
  if(!file || !currentUser || !currentProfile) return;

  const isImage = file.type.startsWith('image/');
  const isPdf = file.type === 'application/pdf';
  if(!isImage && !isPdf){
    alert('الملفات المسموحة بس: صور أو PDF.');
    return;
  }
  if(file.size > 10 * 1024 * 1024){
    alert('حجم الملف كبير أوي، الحد الأقصى 10 ميجابايت.');
    return;
  }

  uploadChipEl.style.display = 'flex';
  uploadChipTextEl.textContent = 'جاري رفع ' + (isImage ? 'الصورة' : 'الملف') + '...';

  try{
    const path = 'chatUploads/' + currentRoom + '/' + currentUser.uid + '_' + Date.now() + '_' + file.name;
    const sRef = storageRef(storage, path);
    const task = uploadBytesResumable(sRef, file);

    task.on('state_changed', (snap)=>{
      const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
      uploadChipTextEl.textContent = 'جاري الرفع... ' + pct + '%';
    });

    await task;
    const url = await getDownloadURL(sRef);

    const payload = {
      uid: currentUser.uid,
      name: currentProfile.name,
      photoURL: currentProfile.photoURL,
      verified: currentProfile.verified === true,
      text: '',
      type: isImage ? 'image' : 'file',
      fileURL: url,
      fileName: file.name,
      fileSize: file.size,
      createdAt: serverTimestamp()
    };
    if(replyingTo){ payload.replyTo = replyingTo; clearReply(); }

    await addDoc(collection(db, 'chatRooms', currentRoom, 'messages'), payload);
  }catch(err){
    alert('حصلت مشكلة في رفع الملف، جرب تاني.');
  }finally{
    uploadChipEl.style.display = 'none';
  }
});

function listenMessages(){
  if(unsubscribe) unsubscribe();
  messagesEl.innerHTML = '<div class="empty-state">جاري التحميل...</div>';
  const q = query(
    collection(db, 'chatRooms', currentRoom, 'messages'),
    orderBy('createdAt', 'asc'),
    limit(200)
  );
  unsubscribe = onSnapshot(q, (snap)=>{
    if(snap.empty){
      messagesEl.innerHTML = '<div class="empty-state">لسه مفيش رسائل هنا، ابدأ الدردشة!</div>';
      return;
    }
    messagesEl.innerHTML = '';
    snap.forEach(docSnap=>{
      const m = docSnap.data();
      messagesCache[docSnap.id] = m;
      const isOwn = currentUser && m.uid === currentUser.uid;
      const row = document.createElement('div');
      row.className = 'msg-row' + (isOwn ? ' own' : '');
      row.id = 'msg-' + docSnap.id;

      const avatar = document.createElement('img');
      avatar.className = 'msg-avatar';
      avatar.src = m.photoURL || DEFAULT_AVATAR;

      const body = document.createElement('div');
      body.className = 'msg-body';

      const nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.innerHTML = (m.name || 'طالب') + (m.verified ? ' <span class="badge">✔</span>' : '');

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if(m.replyTo){
        const quote = document.createElement('div');
        quote.className = 'msg-quote';
        quote.innerHTML = '<span class="qname">' + (m.replyTo.name || '') + '</span><span class="qtext"></span>';
        quote.querySelector('.qtext').textContent = m.replyTo.text || '';
        quote.addEventListener('click', (e)=>{
          e.stopPropagation();
          const target = document.getElementById('msg-' + m.replyTo.id);
          if(target){ target.scrollIntoView({behavior:'smooth', block:'center'}); }
        });
        bubble.appendChild(quote);
      }

      if(m.type === 'image' && m.fileURL){
        const img = document.createElement('img');
        img.className = 'msg-image';
        img.src = m.fileURL;
        img.addEventListener('click', (e)=>{ e.stopPropagation(); window.open(m.fileURL, '_blank'); });
        bubble.appendChild(img);
        if(m.text){
          const cap = document.createElement('div');
          cap.textContent = m.text;
          cap.style.marginTop = '4px';
          bubble.appendChild(cap);
        }
      } else if(m.type === 'file' && m.fileURL){
        const card = document.createElement('a');
        card.className = 'msg-file-card';
        card.href = m.fileURL;
        card.target = '_blank';
        card.addEventListener('click', (e)=> e.stopPropagation());
        card.innerHTML = '<span class="fic">📄</span><div class="finfo"><div class="fname"></div><div class="fsize"></div></div>';
        card.querySelector('.fname').textContent = m.fileName || 'ملف';
        card.querySelector('.fsize').textContent = formatFileSize(m.fileSize);
        bubble.appendChild(card);
      } else {
        const textSpan = document.createElement('span');
        textSpan.textContent = m.text || '';
        bubble.appendChild(textSpan);
      }

      const meta = document.createElement('div');
      meta.className = 'msg-time';
      meta.innerHTML = (m.editedAt ? '<span class="edited">(معدلة)</span>' : '') + formatTime(m.createdAt);

      body.appendChild(nameEl);
      body.appendChild(bubble);
      body.appendChild(meta);

      row.appendChild(avatar);
      row.appendChild(body);

      // click on bubble -> contextual actions menu
      bubble.addEventListener('click', ()=>{
        const actions = [];
        actions.push({
          icon:'↩️', label:'رد',
          onClick: ()=> setReplyTarget(docSnap.id, m.name || 'طالب', m.text || (m.type==='image' ? '📷 صورة' : m.type==='file' ? '📎 ' + (m.fileName||'ملف') : ''))
        });
        if(isOwn && !m.type){
          actions.push({
            icon:'✏️', label:'تعديل',
            onClick: ()=>{
              const editBox = document.createElement('div');
              editBox.className = 'edit-box';
              const input = document.createElement('input');
              input.type = 'text';
              input.value = m.text || '';
              input.maxLength = 900;
              const saveBtn = document.createElement('button');
              saveBtn.type = 'button';
              saveBtn.textContent = 'حفظ';
              const cancelBtn = document.createElement('button');
              cancelBtn.type = 'button';
              cancelBtn.className = 'cancel-edit';
              cancelBtn.textContent = 'إلغاء';
              editBox.appendChild(input);
              editBox.appendChild(saveBtn);
              editBox.appendChild(cancelBtn);
              body.replaceChild(editBox, bubble);
              input.focus();
              async function save(){
                const newText = input.value.trim();
                if(!newText) return;
                try{
                  await updateDoc(doc(db,'chatRooms',currentRoom,'messages',docSnap.id), {
                    text: newText, editedAt: serverTimestamp()
                  });
                }catch(e){}
              }
              saveBtn.addEventListener('click', save);
              input.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); save(); } });
              cancelBtn.addEventListener('click', ()=>{ body.replaceChild(bubble, editBox); });
            }
          });
        }
        if(isOwn || isAdmin){
          actions.push({
            icon:'🗑', label:'حذف', danger:true,
            onClick: async ()=>{ try{ await deleteDoc(doc(db,'chatRooms',currentRoom,'messages',docSnap.id)); }catch(e){} }
          });
        }
        openActionsMenu(bubble, actions);
      });

      messagesEl.appendChild(row);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

composer.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const text = msgInput.value.trim();
  if(!text || !currentUser || !currentProfile) return;
  sendBtn.disabled = true;
  try{
    const payload = {
      uid: currentUser.uid,
      name: currentProfile.name,
      photoURL: currentProfile.photoURL,
      verified: currentProfile.verified === true,
      text: text,
      createdAt: serverTimestamp()
    };
    if(replyingTo) payload.replyTo = replyingTo;
    await addDoc(collection(db, 'chatRooms', currentRoom, 'messages'), payload);
    msgInput.value = '';
    clearReply();
  }catch(err){
    alert('حصلت مشكلة في إرسال الرسالة، جرب تاني.');
  }finally{
    sendBtn.disabled = false;
  }
});

onAuthStateChanged(auth, async (user)=>{
  if(!user || (!user.emailVerified && !user.providerData.some(p=>p.providerId==='google.com'))){
    gateEl.classList.remove('hide');
    return;
  }
  const snap = await getDoc(doc(db,'users',user.uid));
  if(!snap.exists() || !snap.data().name || !snap.data().photoURL){
    window.location.href = 'login.html?redirect=chat.html';
    return;
  }
  const profile = snap.data();
  if(profile.banned === true){
    messagesEl.innerHTML = '';
    gateEl.classList.remove('hide');
    gateEl.querySelector('.icon').textContent = '🚫';
    gateEl.querySelector('h2').textContent = 'حسابك محظور';
    gateEl.querySelector('p').textContent = 'محدش يقدر يستخدم الدردشة بحساب محظور. لو ده غلط، تواصل مع المستر.';
    gateEl.querySelector('a').style.display = 'none';
    return;
  }

  currentUser = user;
  currentProfile = profile;
  myAvatarEl.src = profile.photoURL || DEFAULT_AVATAR;
  gateEl.classList.add('hide');

  const adminSnap = await getDoc(doc(db,'admins',user.uid));
  isAdmin = adminSnap.exists();

  renderRoomLists();
  listenMessages();
});
</script>
